<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        h1{
            color:rgb(144, 209, 59);
            font-size:30px;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        form {
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            display: inline-block;
        }
         .card{
            width:300px;
            background:white;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,0.2);
            overflow:hidden;
            text-align:center;
        }

        .card img{
            width:100%;
            height:200px;
            object-fit:cover;
        }

        .card h2{
            margin:15px 0 10px;
        }

        .card p{
            padding:0 15px 20px;
            color:#555;
            font-size:15px;
        }
    </style>
    <h1>Hello, world!</h1>
    <form action="submit">
        Enter your name: <input type="text" name="name"><br><br>
        Enter your email: <input type="email" name="email"><br><br>
        <input type="submit" value="Submit"> 
    </form>
    <div class="card">
    <img src="Natureimage.jpg" alt="Nature Image">

    <h2>Beautiful Nature</h2>

    <p>
        Nature is full of beautiful landscapes, fresh air,
        green forests, and peaceful environments that make
        life healthier and happier.
    </p>
</div>
</body>
</html>
